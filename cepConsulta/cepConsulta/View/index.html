<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Consulta de CEP</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0f0f0f;
            --surface: #181818;
            --border: #2a2a2a;
            --accent: #c8f060;
            --text: #f0f0f0;
            --muted: #555;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        main {
            width: 100%;
            max-width: 480px;
            animation: fadeUp .5s ease both;
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: .4rem;
        }

        h1 span { color: var(--accent); }

        p.sub {
            color: var(--muted);
            font-size: .8rem;
            margin-bottom: 2rem;
            letter-spacing: .05em;
        }

        .input-row {
            display: flex;
            gap: .5rem;
            margin-bottom: 1.5rem;
        }

        input {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: .9rem;
            padding: .75rem 1rem;
            border-radius: 6px;
            outline: none;
            transition: border-color .2s;
            width: 100%;
        }

        input:focus { border-color: var(--accent); }
        input[readonly] { color: var(--muted); cursor: default; }
        input::placeholder { color: var(--muted); }

        button {
            background: var(--accent);
            color: #0f0f0f;
            border: none;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: .85rem;
            padding: .75rem 1.4rem;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity .2s, transform .1s;
            letter-spacing: .03em;
        }

        button:hover { opacity: .85; }
        button:active { transform: scale(.97); }
        button:disabled { opacity: .4; cursor: not-allowed; }

        .fields {
            display: flex;
            flex-direction: column;
            gap: .6rem;
        }

        .field-label {
            font-size: .65rem;
            color: var(--muted);
            letter-spacing: .1em;
            text-transform: uppercase;
            margin-bottom: .2rem;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <main>
        <h1>Consulta de <span>CEP</span></h1>
        <p class="sub">// busca assíncrona via ViaCEP</p>

        <div class="input-row">
            <input type="text" id="cep" placeholder="00000-000" maxlength="9">
            <button onclick="consultarCep()">Buscar</button>

            <a href="listagem.php" style="color: var(--accent);font-size: .8rem;text-decoration: none;">→ → → Lista</a>
        </div>

        <div class="fields" id="resultado">
            <div class="field">
                <span class="field-label">Logradouro</span>
                <input type="text" id="logradouro" placeholder="—" readonly>
            </div>
            <div class="field">
                <span class="field-label">Bairro</span>
                <input type="text" id="bairro" placeholder="—" readonly>
            </div>
            <div class="field">
                <span class="field-label">Cidade</span>
                <input type="text" id="cidade" placeholder="—" readonly>
            </div>
        </div>
    </main>
</body>
</html>
